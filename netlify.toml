[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ⚡ Force rebuild of marketing-export.v2 function
[functions."marketing-export.v2"]
  memory = 1024
  timeout = 30
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**/*.js"]

# Keep other functions with their settings
[functions."*"]
  node_bundler = "esbuild"
  external_node_modules = [
    "@supabase/supabase-js",
    "jsonwebtoken",
    "bcryptjs",
    "resend",
    "qrcode",
    "uuid",
    "stripe",
    "xlsx"
  ]

[functions."check-payment-status"]
  schedule = "0 8 * * *"

[functions."send-trial-reminders"]
  schedule = "0 9 * * *"

[functions."archive-old-bookings"]
  schedule = "0 2 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fastcheckin-logo.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[context.production.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[context.deploy-preview.environment]
  NODE_VERSION = "20"

[context.branch-deploy.environment]
  NODE_VERSION = "20"
