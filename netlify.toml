[build]
  command = "vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ============================================================
# SCHEDULED FUNCTIONS (Cron Jobs)
# ============================================================

# Payment status check - Runs daily at 8 AM
[functions."check-payment-status"]
  schedule = "0 8 * * *"

# Trial reminder emails - Runs daily at 9 AM
[functions."send-trial-reminders"]
  schedule = "0 9 * * *"

# Newsletter digest - Runs weekly on Monday at 10 AM
[functions."send-newsletter-digest"]
  schedule = "0 10 * * 1"

# Subscription invoice reminder - Runs daily at 2 PM
[functions."send-invoice-reminders"]
  schedule = "0 14 * * *"

# Clean up expired tokens - Runs daily at 3 AM
[functions."cleanup-expired-tokens"]
  schedule = "0 3 * * *"

# Generate business analytics reports - Runs monthly on 1st at 5 AM
[functions."generate-monthly-reports"]
  schedule = "0 5 1 * *"

# ============================================================
# REDIRECTS
# ============================================================

# SPA fallback - All routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API redirects (optional - if you want cleaner URLs)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Health check endpoint (no function needed)
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health-check"
  status = 200

# ============================================================
# HEADERS (Security & Caching)
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Additional security headers
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fastcheckin-logo.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# ENVIRONMENT VARIABLES (Production overrides)
# ============================================================

[context.production.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  # ⚠️ IMPORTANT: Add your JWT Secret here
  SUPABASE_JWT_SECRET = "your_supabase_jwt_secret_here"

[context.deploy-preview.environment]
  NODE_VERSION = "20"
  SUPABASE_JWT_SECRET = "your_supabase_jwt_secret_here"

[context.branch-deploy.environment]
  NODE_VERSION = "20"
  SUPABASE_JWT_SECRET = "your_supabase_jwt_secret_here"
