<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Dynamic title - will be updated by React based on business -->
    <title>FastCheckin - Digital Hotel Check-in</title>
    
    <!-- SEO and Meta Tags -->
    <meta name="description" content="Digital check-in solution for hotels and guest houses. Fast, secure, POPIA compliant.">
    <meta name="theme-color" content="#f59e0b">
    <meta name="msapplication-TileColor" content="#f59e0b">
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Vite will automatically inject the compiled CSS here -->
    <!-- Do NOT add manual CSS links or Tailwind CDN -->
    
    <style>
        /* Critical CSS - Inline for fastest First Paint */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f0;
            color: #1c1917;
            min-height: 100vh;
        }
        
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Loading state - prevents layout shift */
        #root {
            min-height: 100vh;
        }
        
        /* Keyframe animations - critical for initial render */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
